name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-release-policy:
    name: NPM Release Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Validate release workflow and ownership
        run: npm run test:scripts

  rpc-contract:
    name: RPC Contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.1
      - name: Install dependencies
        run: npm ci
      - name: Validate RPC contract
        run: npm run contract:check

  js-workspaces:
    name: JS - ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - "@codex/mac-bridge"
          - "@clawdex/cursor-app-server"
          - "clawdex-mobile"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w "${{ matrix.workspace }}"

      - name: Typecheck
        run: npm run typecheck -w "${{ matrix.workspace }}"

      - name: Test
        run: npm run test -w "${{ matrix.workspace }}"

      - name: Branch coverage
        if: matrix.workspace == 'clawdex-mobile'
        run: npm run test:coverage -w clawdex-mobile

  rust-bridge:
    name: Rust Bridge
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy,rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/rust-bridge -> target

      - name: Rust fmt
        working-directory: services/rust-bridge
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: services/rust-bridge
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Rust check
        working-directory: services/rust-bridge
        run: cargo check --locked

      - name: Rust test
        working-directory: services/rust-bridge
        run: cargo test --locked -- --test-threads=1

      - name: Boundary integration suite
        run: npm run test:boundary

  rust-bridge-coverage:
    name: Rust Branch Coverage
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false

      - name: Setup pinned nightly Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-07-15
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.83.4
        with:
          tool: cargo-llvm-cov@0.8.7
          fallback: none

      - name: Cache Rust coverage dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/rust-bridge -> target
          key: llvm-cov-branch-nightly-2026-07-15-v1
          cache-bin: false
          cache-on-failure: true

      - name: Enforce Rust branch coverage
        run: npm run coverage:rust

      - name: Upload Rust coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-branch-coverage-macos
          path: |
            services/rust-bridge/target/llvm-cov/coverage.json
            services/rust-bridge/target/llvm-cov/html
