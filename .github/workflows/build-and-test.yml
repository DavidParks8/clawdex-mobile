name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22.13.1"
  RUST_VERSION: "1.97.1"

jobs:
  repository-policy:
    name: Repository Policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Validate repository policy
        run: |
          npm run version:check
          npm run docs:check
          npm run payment:check
          npm run test:scripts
          npm run security:check
          npm run duplicates:native

  rpc-contract:
    name: RPC Contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.1

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/rust-bridge -> target

      - name: Install dependencies
        run: npm ci

      - name: Validate RPC contract
        run: npm run contract:check

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -w @tethercode/mobile

      - name: Check source duplication
        run: npm run duplicates:mobile

      - name: Typecheck
        run: npm run typecheck -w @tethercode/mobile

      - name: Test with branch coverage
        run: npm run test:coverage -w @tethercode/mobile

      - name: Build Expo export
        run: npm run build -w @tethercode/mobile

      - name: Upload mobile coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: apps/mobile/coverage
          if-no-files-found: warn

      - name: Upload Expo export
        uses: actions/upload-artifact@v4
        with:
          name: mobile-expo-export
          path: apps/mobile/dist

  rust-bridge:
    name: Rust Bridge
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy,rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/rust-bridge -> target

      - name: Check formatting
        working-directory: services/rust-bridge
        run: cargo fmt --check

      - name: Check all targets
        working-directory: services/rust-bridge
        run: cargo check --locked --all-targets --all-features

      - name: Lint all targets
        working-directory: services/rust-bridge
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        working-directory: services/rust-bridge
        run: cargo test --locked --all-targets --all-features -- --test-threads=1

  desktop-macos:
    name: Desktop macOS
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: clippy,rustfmt

      - name: Cache desktop Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop -> target
            services/rust-bridge -> target

      - name: Install repository dependencies
        run: npm ci

      - name: Check formatting
        working-directory: apps/desktop
        run: cargo fmt --check

      - name: Check desktop
        run: npm run desktop:check

      - name: Lint desktop
        working-directory: apps/desktop
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test desktop
        run: npm run desktop:test

      - name: Build macOS app
        run: npm run desktop:build:macos

      - name: Verify native bundle policy
        run: |
          APP="apps/desktop/dist/TetherCode.app"
          test -x "$APP/Contents/MacOS/TetherCode"
          test -x "$APP/Contents/Resources/bin/tethercode"
          test -x "$APP/Contents/Resources/bin/tethercode-bridge"
          ! find "$APP" -type f \( -name '*.js' -o -name package.json -o -name package-lock.json -o -name node -o -name npm -o -name npx \) -print | grep .
          ! find "$APP" -type f -print0 | xargs -0 strings | grep -Ei 'slint|node_modules|TETHERCODE_BRIDGE_BINARY|TETHERCODE_PACKAGE_ROOT|vendor/bridge-binaries|services/rust-bridge/target'
          codesign --verify --deep --strict "$APP"

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: tethercode-desktop-macos-${{ runner.arch }}
          path: apps/desktop/dist/TetherCode-*.zip
          if-no-files-found: error

  rust-coverage:
    name: Rust Branch Coverage
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
          package-manager-cache: false

      - name: Setup pinned nightly Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-07-15
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2.83.4
        with:
          tool: cargo-llvm-cov@0.8.7
          fallback: none

      - name: Cache Rust coverage dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/rust-bridge -> target
          key: llvm-cov-branch-nightly-2026-07-15-v1
          cache-bin: false
          cache-on-failure: true

      - name: Enforce Rust branch coverage
        run: npm run coverage:rust

      - name: Upload Rust coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-branch-coverage-macos
          path: |
            services/rust-bridge/target/llvm-cov/coverage.json
            services/rust-bridge/target/llvm-cov/html
          if-no-files-found: warn